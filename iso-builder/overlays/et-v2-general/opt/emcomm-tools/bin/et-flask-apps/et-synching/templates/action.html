<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bluetooth GPS Sync — LiaisonOS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: #e0e0e0; min-height: 100vh; }
        .container { max-width: 600px; margin: 0 auto; padding: 2rem 1.5rem; }
        h1 { font-size: 1.3rem; color: #FFA500; margin-bottom: 0.3rem; }
        .subtitle { font-size: 0.85rem; color: #9e9e9e; margin-bottom: 1rem; }
        .log-label { font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.3rem; }
        .log { background: #111; border: 1px solid #333; border-radius: 6px; padding: 1rem; min-height: 200px; max-height: 340px; overflow-y: auto; margin-bottom: 1.5rem; font-family: monospace; font-size: 0.82rem; }
        .log-line { padding: 2px 0; color: #9dbfad; }
        .log-line.error { color: #f87171; }
        .log-line.success { color: #4ade80; }
        .log-line.info { color: #60a5fa; }
        .log-line.warn { color: #fbbf24; }
        .log-line.sep { color: #444; }
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #444; border-top-color: #FFA500; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .gps-note { font-size: 0.82rem; color: #9dbfad; background: #1a2a1a; border-left: 3px solid #4ade80; padding: 0.6rem 0.8rem; border-radius: 4px; margin-bottom: 1rem; }
        .btn { padding: 0.7rem 2rem; background: #FFA500; color: #1a1a1a; font-weight: 600; border: none; border-radius: 6px; cursor: pointer; font-size: 0.95rem; }
        .btn:hover { background: #ff8c00; }
        .clock-box { text-align: center; margin-bottom: 1.5rem; }
        .clock-label { font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.2rem; }
        .clock { font-family: 'Courier New', monospace; font-size: 2.8rem; font-weight: 700; color: #4ade80; letter-spacing: 0.05em; }
        .clock.syncing { color: #FFA500; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title">Connecting...</h1>
        <div class="subtitle" id="subtitle">Establishing Bluetooth GPS connection</div>

        <div class="log-label">Session Log</div>
        <div class="log" id="log">
            <div class="log-line"><span class="spinner"></span> Starting...</div>
        </div>

        <div class="clock-box">
            <div class="clock-label">System Time (UTC)</div>
            <div class="clock syncing" id="clock">--:--:--</div>
        </div>

        <div class="gps-note" id="gps-note" style="display:none;">
            GPS mode is active. Enable <strong>Track</strong> in the dashboard to continuously update your grid location.<br>
            Close this window to keep GPS running in the background.
        </div>

        <button class="btn" id="stop-gps-btn" style="display:none; background:#f87171; margin-right:0.5rem;" onclick="stopGps()">Stop GPS</button>
        <button class="btn" id="retry-btn" style="display:none; background:#60a5fa; margin-right:0.5rem;" onclick="retrySync()">Retry</button>
        <button class="btn" id="done-btn" style="display:none;" onclick="closeWindow()">Close</button>
    </div>

<script>
    const clockEl = document.getElementById('clock');
    function updateClock() {
        const now = new Date();
        const h = String(now.getUTCHours()).padStart(2, '0');
        const m = String(now.getUTCMinutes()).padStart(2, '0');
        const s = String(now.getUTCSeconds()).padStart(2, '0');
        clockEl.textContent = `${h}:${m}:${s}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    const mac = "{{ mac }}";
    const mode = "{{ mode }}";
    const logEl = document.getElementById('log');
    let gpsActive = false;
    let esClosed = false;

    function addLog(msg, cls) {
        const line = document.createElement('div');
        line.className = 'log-line' + (cls ? ' ' + cls : '');
        line.textContent = msg;
        logEl.appendChild(line);
        logEl.scrollTop = logEl.scrollHeight;
    }

    function clearSpinner() {
        const spinner = logEl.querySelector('.spinner');
        if (spinner) spinner.closest('.log-line').remove();
    }

    function sep() {
        addLog('─────────────────────────────────', 'sep');
    }

    const es = new EventSource(`/api/connect/stream?mac=${encodeURIComponent(mac)}&mode=${encodeURIComponent(mode)}`);

    es.onmessage = function(e) {
        const msg = JSON.parse(e.data);

        if (msg.done) {
            esClosed = true;
            es.close();
            clearSpinner();
            sep();

            if (msg.success) {
                clockEl.classList.remove('syncing');
                if (mode === 'gps') {
                    addLog('✓ GPS Mode Active', 'success');
                    document.getElementById('title').textContent = 'GPS Mode Active';
                    document.getElementById('title').style.color = '#4ade80';
                    document.getElementById('subtitle').textContent = 'Live GPS connection established';
                    if (msg.lat) {
                        addLog(`  Latitude  : ${msg.lat.toFixed(5)}`, 'info');
                        addLog(`  Longitude : ${msg.lon.toFixed(5)}`, 'info');
                        addLog(`  Grid      : ${msg.grid}`, 'info');
                        if (msg.time) addLog(`  UTC Time  : ${msg.time}`, 'info');
                    }
                    gpsActive = true;
                    document.getElementById('gps-note').style.display = 'block';
                    document.getElementById('stop-gps-btn').style.display = 'inline-block';
                    document.getElementById('done-btn').textContent = 'Close (GPS stays active)';
                } else {
                    addLog('✓ Sync Complete', 'success');
                    document.getElementById('title').textContent = 'Sync Complete';
                    document.getElementById('title').style.color = '#4ade80';
                    document.getElementById('subtitle').textContent = 'Time and grid updated successfully';
                    if (msg.lat) {
                        addLog(`  Latitude  : ${msg.lat.toFixed(5)}`, 'info');
                        addLog(`  Longitude : ${msg.lon.toFixed(5)}`, 'info');
                        addLog(`  Grid      : ${msg.grid}`, 'info');
                        if (msg.time) addLog(`  UTC Time  : ${msg.time}`, 'info');
                    }
                    document.getElementById('done-btn').textContent = 'Close';
                }
            } else {
                addLog('✗ Connection Failed', 'error');
                addLog('  ' + (msg.error || 'Unknown error'), 'error');
                document.getElementById('title').textContent = 'Connection Failed';
                document.getElementById('title').style.color = '#f87171';
                document.getElementById('subtitle').textContent = 'Could not complete connection';
                document.getElementById('done-btn').textContent = 'Close';
                document.getElementById('retry-btn').style.display = 'inline-block';
            }

            document.getElementById('done-btn').style.display = 'inline-block';
            return;
        }

        if (msg.msg) {
            clearSpinner();
            addLog('▸ ' + msg.msg);
        }
    };

    function retrySync() {
        location.reload();
    }

    function closeWindow() {
        try { window.pywebview.api.close(); } catch(e) {}
        try { window.close(); } catch(e) {}
    }

    function stopGps() {
        es.close();
        gpsActive = false;
        sep();
        addLog('▸ Stopping GPS...', 'warn');
        document.getElementById('gps-note').style.display = 'none';
        document.getElementById('stop-gps-btn').style.display = 'none';
        fetch('/api/disconnect', {method: 'POST'}).finally(() => {
            addLog('✓ GPS Stopped', 'success');
            document.getElementById('title').textContent = 'GPS Stopped';
            document.getElementById('title').style.color = '#9e9e9e';
            document.getElementById('done-btn').textContent = 'Close';
        });
    }

    es.onerror = function() {
        if (esClosed) return;
        esClosed = true;
        es.close();
        clearSpinner();
    };
</script>
</body>
</html>
